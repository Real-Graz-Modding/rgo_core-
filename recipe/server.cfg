# ────────────────────────────────────────────────────────────────────────────
#  rgo_core – server.cfg
#  Generiert durch das txAdmin-Rezept (https://github.com/Real-Graz-Modding/rgo_core-)
# ────────────────────────────────────────────────────────────────────────────

endpoint_add_tcp "0.0.0.0:30120"
endpoint_add_udp "0.0.0.0:30120"

sv_maxclients 48

# Server-Name (im txAdmin-Rezept gesetzt)
sv_hostname "{{serverName}}"
sets sv_projectName "rgo_core"
sets sv_projectDesc "Ein modernes FiveM-Framework von Real-Graz-Modding"

# FiveM-Lizenzschlüssel (keymaster.fivem.net)
sv_licenseKey "{{svLicenseKey}}"

# ── Datenbank ────────────────────────────────────────────────────────────────
# Wird automatisch vom txAdmin-Rezept gesetzt.
set mysql_connection_string "{{dbConnectionString}}"

# ── OneSync (Pflicht für rgo_core) ──────────────────────────────────────────
set onesync on

# ── rgo_core Einstellungen ───────────────────────────────────────────────────
set ox:characterSlots 1
# set ox:plateFormat "........"
# set ox:defaultVehicleStore "impound"
# set ox:createDefaultAccount 1
# set ox:deathSystem 1
# set ox:characterSelect 1
# set ox:spawnLocation "[-258.211, -293.077, 21.6132, 206.0]"
# set ox:hospitalBlips 1

# ── Ressourcen starten ───────────────────────────────────────────────────────

ensure mapmanager
ensure chat
ensure spawnmanager
ensure sessionmanager
ensure basic-gamemode
ensure hardcap
ensure screenshot-basic

ensure oxmysql
ensure ox_lib
ensure ox_core

# Inventar
ensure ox_inventory

# Voice
ensure pma-voice

